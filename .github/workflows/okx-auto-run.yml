name: OKX SOP Bot

permissions:
  contents: write

on:
  schedule:
    # 每 5 分钟运行一次（UTC 时间）
    - cron: "*/5 * * * *"
  workflow_dispatch:    # 允许手动触发

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Python 环境
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. 安装依赖
      - name: Install dependencies
        run: |
          pip install requests

      # 4. 创建日志目录
      - name: Prepare logs
        run: mkdir -p logs

      # 5. 运行机器人（传递 Secrets 作为环境变量）
      - name: Run OKX Bot
        env:
          OKX_API_KEY: ${{ secrets.OKX_API_KEY }}
          OKX_SECRET_KEY: ${{ secrets.OKX_SECRET_KEY }}
          OKX_PASSPHRASE: ${{ secrets.OKX_PASSPHRASE }}
        run: |
          echo "===== RUN $(date -u) =====" >> logs/run.log
          python main.py 2>&1 | tee -a logs/run.log

      # 6. 保存简要日志（JSON 格式）
      - name: Save JSON log
        run: |
          echo "{\"time\":\"$(date -u)\",\"status\":\"completed\"}" >> logs/log.json

      # 7. 提交并推送日志文件
      - name: Commit logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/
          git commit -m "Update logs $(date -u)" || echo "No changes to commit"
          git push origin HEAD
