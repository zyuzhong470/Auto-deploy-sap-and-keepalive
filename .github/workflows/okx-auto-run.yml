name: SOP-OKX-CLEAN-RUN

permissions:
  contents: write

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 拉代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3️⃣ 安装依赖
      - name: Install
        run: |
          pip install requests pandas

      # 4️⃣ 运行 bot + 记录输出
      - name: Run Bot
        env:
          OKX_API_KEY: ${{ secrets.OKX_API_KEY }}
          OKX_SECRET_KEY: ${{ secrets.OKX_SECRET_KEY }}
          OKX_PASSPHRASE: ${{ secrets.OKX_PASSPHRASE }}
        run: |
          mkdir -p logs
          echo "===== RUN $(date -u) =====" >> logs/run.log
          python main.py >> logs/run.log 2>&1

      # 5️⃣ 生成简单日志
      - name: Save snapshot log
        run: |
          echo "{\"time\":\"$(date -u)\",\"status\":\"run\"}" >> logs/log.json

      # 6️⃣ 提交日志
      - name: Commit logs
        run: |
          git config user.name "log-bot"
          git config user.email "log@bot.com"

          git add logs
          git commit -m "log $(date -u)" || echo "no change"
          git push
